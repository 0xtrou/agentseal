[book]
authors = ["Agent Seal Contributors"]
language = "en"
src = "src"
title = "Agent Seal Documentation"
description = "Encrypted, sandbox-bound agent delivery system for AI workloads"

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "rust"
preferred-dark-theme = "rust"
git-repository-url = "https://github.com/0xtrou/agent-seal"
edit-url-template = "https://github.com/0xtrou/agent-seal/edit/main/docs/src/{path}"
site-url = "/"
cname = "agent-seal.dev"

[output.html.print]
enable = true

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true

[output.html.fold]
enable = true
level = 1